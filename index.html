// ─ D-view page swipe (left=tomorrow, right=yesterday) ─
function initDateSwipe(){
  const COMMIT=80;
  let sx=0,sy=0,dx=0,tracking=false,committed=false,blocked=false,active=false;

  function isSwipeZone(target){
    // Any touch within the D-view page (todayView) counts as a swipe zone
    // candidate — isExcluded() below filters out interactive elements.
    return target.closest('#todayView')!==null;
  }
  function isExcluded(target){
    const hit=target.closest(
      '.add-btn,.preset-btn,.preset-sep,.ur-btn,.trash-btn,.ai-b,'+
      '.task-menu,.ts,.big-item,.sm-item,.swipe-wrap,.ts-hd,'+
      '.big-add,.sm-ghost-inline,#addRow button,#addRow .preset-btn'
    );
    return hit!==null;
  }

  function onStart(e){
    const target=e.target;
    // Always hard-reset state at the very start of every touch,
    // regardless of any previous (possibly stuck) state.
    active=false;tracking=false;committed=false;blocked=false;dx=0;

    if(!isSwipeZone(target))return;
    active=true;
    if(isExcluded(target)){blocked=true;return;}
    const t=e.touches[0];
    sx=t.clientX;sy=t.clientY;
  }
  function onMove(e){
    if(!active||blocked||committed)return;
    const pc=document.getElementById('pageContent');
    const t=e.touches[0];
    const ddx=t.clientX-sx,ddy=t.clientY-sy;
    if(!tracking){
      if(Math.abs(ddx)<6&&Math.abs(ddy)<6)return;
      if(Math.abs(ddy)>Math.abs(ddx)*1.3){blocked=true;return;}
      tracking=true;
      pc.style.transition='none';
    }
    e.preventDefault();
    dx=ddx;
    pc.style.transform=`translateX(${dx}px)`;
    pc.style.opacity=String(1-Math.min(Math.abs(dx)/200,0.3));
  }
  function onEnd(){
    if(!active){return;}
    active=false;
    if(blocked){blocked=false;return;}
    const pc=document.getElementById('pageContent');
    if(!tracking){
      pc.style.transition='';pc.style.transform='';pc.style.opacity='';
      return;
    }
    pc.style.transition='transform .22s cubic-bezier(.4,0,.2,1),opacity .18s';
    if(Math.abs(dx)>=COMMIT){
      committed=true;
      const dir=dx<0?1:-1;
      pc.style.transform=`translateX(${dx<0?'-100%':'100%'})`;
      pc.style.opacity='0';
      setTimeout(()=>{
        pc.style.transition='none';
        pc.style.transform=`translateX(${dx<0?'100%':'-100%'})`;
        pc.style.opacity='0';
        viewDate=addDays(viewDate,dir);
        updateHeaderDate();renderToday();updateTrashBadge();
        pc.offsetWidth;
        pc.style.transition='transform .22s cubic-bezier(.4,0,.2,1),opacity .18s';
        pc.style.transform='translateX(0)';
        pc.style.opacity='1';
        setTimeout(()=>{
          pc.style.transition='';pc.style.transform='';pc.style.opacity='';
          committed=false;tracking=false;
        },230);
      },180);
    } else {
      pc.style.transform='translateX(0)';
      pc.style.opacity='1';
      setTimeout(()=>{pc.style.transition='';pc.style.transform='';pc.style.opacity='';},240);
      tracking=false;
    }
  }
  function onCancel(){
    active=false;blocked=false;tracking=false;committed=false;
    const pc=document.getElementById('pageContent');
    pc.style.transition='';pc.style.transform='';pc.style.opacity='';
  }

  // Event delegation on document — survives DOM re-renders from renderToday()
  document.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd,{passive:true});
  document.addEventListener('touchcancel',onCancel,{passive:true});
}

// ═══════ TASK MOVE MINI MENU ═══════
let _taskMenuCtx=null; // {type, secId, idx}

const IS_TOUCH=('ontouchstart' in window)||navigator.maxTouchPoints>0;

// ═══════════════════════════════════════════════════════════
//  DESKTOP KEYBOARD NAVIGATION (activation, arrow-key movement,
//  multi-select, and keyboard-driven reordering)
// ═══════════════════════════════════════════════════════════
//
// "Active" items are a selection concept SEPARATE from text-edit focus.
// Clicking the non-text area of a row (the row-spacer / B-zone) selects
// it without entering edit mode. Arrow keys then move the selection up/
// down through a single FLAT list that treats every big+small item
// across every currently-expanded section as one continuous sequence —
// this is what lets selection/movement cross the big/small boundary and
// section boundaries seamlessly, exactly like a Finder list.

const ACTIVE=new Set(); // Set of "type:secId:idx" keys, e.g. "big:am:0"
let _anchorKey=null;    // anchor item for shift-range extension
let _focusFlatIdx=null; // the "moving end" of a shift-extended range — tracked independently so extend/shrink happens one step at a time, Finder-style

function itemKey(type,secId,idx){return `${type}:${secId}:${idx}`;}
function parseItemKey(k){const [type,secId,idxStr]=k.split(':');return{type,secId,idx:parseInt(idxStr)};}

// Build the single flat ordering: for each currently-visible (expanded)
// section in display order, all big items first, then all small items.
function buildFlatList(){
  const k=tKey();
  const list=[];
  SECS.filter(s=>ST.vis.includes(s.id)).forEach(sec=>{
    const bigs=getBigs(k,sec.id);
    bigs.forEach((b,i)=>list.push({type:'big',secId:sec.id,idx:i}));
    const smalls=getSmalls(k,sec.id);
    smalls.forEach((s,i)=>list.push({type:'small',secId:sec.id,idx:i}));
  });
  return list;
}

function findFlatIndex(list,type,secId,idx){
  return list.findIndex(it=>it.type===type&&it.secId===secId&&it.idx===idx);
}

function getRowEl(type,secId,idx){
  const listSel=type==='big'?`#bl-${secId}`:`#sl-${secId}`;
  const cls=type==='big'?'.big-item':'.sm-item';
  const rows=[...document.querySelectorAll(`${listSel} ${cls}`)];
  return rows.find(r=>parseInt(r.dataset.i)===idx);
}

function refreshActiveVisuals(){
  document.querySelectorAll('.big-item.kb-active,.sm-item.kb-active').forEach(el=>el.classList.remove('kb-active'));
  ACTIVE.forEach(k=>{
    const{type,secId,idx}=parseItemKey(k);
    const el=getRowEl(type,secId,idx);
    if(el)el.classList.add('kb-active');
  });
}

function clearActive(){ACTIVE.clear();_anchorKey=null;_focusFlatIdx=null;refreshActiveVisuals();}

function setActiveSingle(type,secId,idx){
  ACTIVE.clear();
  const k=itemKey(type,secId,idx);
  ACTIVE.add(k);
  _anchorKey=k;
  _focusFlatIdx=null; // reset — next shift-extend will re-seed from this new single selection
  refreshActiveVisuals();
}

function isAnyInputFocused(){
  const a=document.activeElement;
  return a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA');
}

// Activate an item by clicking its row-spacer (B-zone). Desktop only.
function activateItem(type,secId,idx,shiftKey){
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();

  if(shiftKey&&_anchorKey){
    // Shift-click: select the contiguous range between the current
    // anchor and the clicked item, inclusive — same behavior as
    // Finder/Explorer range-select.
    const list=buildFlatList();
    const anchor=parseItemKey(_anchorKey);
    const anchorIdx=findFlatIndex(list,anchor.type,anchor.secId,anchor.idx);
    const clickIdx=findFlatIndex(list,type,secId,idx);
    if(anchorIdx>=0&&clickIdx>=0){
      const lo=Math.min(anchorIdx,clickIdx),hi=Math.max(anchorIdx,clickIdx);
      ACTIVE.clear();
      for(let i2=lo;i2<=hi;i2++){
        const it=list[i2];
        ACTIVE.add(itemKey(it.type,it.secId,it.idx));
      }
      _focusFlatIdx=clickIdx; // clicked item becomes the new "moving end"
      refreshActiveVisuals();
      return;
    }
  }

  setActiveSingle(type,secId,idx);
}

function focusItemInput(type,secId,idx){
  const el=getRowEl(type,secId,idx);
  if(!el)return;
  const inp=el.querySelector('input.bi-inp,input.si-inp');
  if(inp){inp.focus();inp.select?.();}
}

// Move the active selection by `delta` positions in the flat list
// (delta = -1 for up, +1 for down). If extend=true, grows/shrinks a
// contiguous range from the anchor instead of replacing the selection.
function moveActiveSelection(delta,extend){
  const list=buildFlatList();
  if(list.length===0)return;

  if(ACTIVE.size===0){
    // nothing active yet — activate the first or last item
    const it=delta<0?list[list.length-1]:list[0];
    setActiveSingle(it.type,it.secId,it.idx);
    _focusFlatIdx=findFlatIndex(list,it.type,it.secId,it.idx);
    return;
  }

  if(!extend){
    const anchor=_anchorKey?parseItemKey(_anchorKey):parseItemKey([...ACTIVE][0]);
    let i=findFlatIndex(list,anchor.type,anchor.secId,anchor.idx);
    if(i<0)i=0;
    let ni=i+delta;
    ni=Math.max(0,Math.min(list.length-1,ni));
    const it=list[ni];
    setActiveSingle(it.type,it.secId,it.idx);
    _focusFlatIdx=ni;
  } else {
    if(!_anchorKey)_anchorKey=[...ACTIVE][0];
    const anchor=parseItemKey(_anchorKey);
    const anchorIdx=findFlatIndex(list,anchor.type,anchor.secId,anchor.idx);

    // The focus point is the "moving end" of the range — it advances
    // one step per keypress, exactly like Finder/Explorer multi-select.
    // If we don't have one yet (first shift-extend after a plain click/
    // move), seed it from the current selection's edge in the direction
    // of travel so the very first extend still feels correct.
    if(_focusFlatIdx===null){
      let edge=anchorIdx;
      ACTIVE.forEach(k=>{
        const p=parseItemKey(k);
        const fi=findFlatIndex(list,p.type,p.secId,p.idx);
        if(fi>=0){
          if(delta<0&&fi<edge)edge=fi;
          if(delta>0&&fi>edge)edge=fi;
        }
      });
      _focusFlatIdx=edge;
    }

    let newFocus=_focusFlatIdx+delta;
    newFocus=Math.max(0,Math.min(list.length-1,newFocus));
    _focusFlatIdx=newFocus;

    const lo=Math.min(anchorIdx,newFocus),hi=Math.max(anchorIdx,newFocus);
    ACTIVE.clear();
    for(let idx2=lo;idx2<=hi;idx2++){
      const it=list[idx2];
      ACTIVE.add(itemKey(it.type,it.secId,it.idx));
    }
    refreshActiveVisuals();
    scrollFlatIdxIntoView(list,newFocus);
    return;
  }
  refreshActiveVisuals();
  scrollActiveIntoView();
}

function scrollFlatIdxIntoView(list,flatIdx){
  const it=list[flatIdx];
  if(!it)return;
  const el=getRowEl(it.type,it.secId,it.idx);
  el?.scrollIntoView({block:'nearest'});
}

function scrollActiveIntoView(){
  if(!_anchorKey)return;
  const{type,secId,idx}=parseItemKey(_anchorKey);
  const el=getRowEl(type,secId,idx);
  el?.scrollIntoView({block:'nearest'});
}

// Move every currently-active item by one slot within the SAME flat
// list (delta=-1 up, +1 down). Crossing the big/small boundary within
// a section, and crossing into an adjacent section, both work because
// everything operates on the single flat ordering.
// ── Lane model for ⇧⌘↑/↓ reordering ──
// Unlike buildFlatList() (which only lists items that exist, used for
// plain up/down selection), reordering needs to treat each section's
// big-lane and small-lane as real "slots" even when empty — otherwise
// movement skips straight over an empty lane/section instead of landing
// in it, and skips the very last slot of a lane before crossing out of
// it. buildLanes() returns one entry per (section, type) pair, in
// display order, regardless of how many items it currently holds.
function buildLanes(){
  const k=tKey();
  const lanes=[];
  SECS.filter(s=>ST.vis.includes(s.id)).forEach(sec=>{
    lanes.push({secId:sec.id,type:'big',items:getBigs(k,sec.id)});
    lanes.push({secId:sec.id,type:'small',items:getSmalls(k,sec.id)});
  });
  return lanes;
}

function findLaneIndex(lanes,type,secId){
  return lanes.findIndex(l=>l.type===type&&l.secId===secId);
}

// Move every currently-active item by one step (delta=-1 up, +1 down)
// through the lane sequence. Within a lane, this swaps with the
// adjacent item. At a lane's edge, the NEXT step moves into the
// adjacent lane (even if empty) rather than skipping it — and crossing
// out of a lane always lands on the first/last slot of the next lane
// first, never jumping past it.
function moveActiveItems(delta){
  if(ACTIVE.size===0)return;
  const k=tKey();
  const lanes=buildLanes(); // [{secId,type,items:[...]}] fixed-length, in display order

  // Each lane keeps its own live array (laneArr[li]) of {active,data}.
  const laneArr=lanes.map((lane,li)=>
    lane.items.map((item,idx)=>({active:ACTIVE.has(itemKey(lane.type,lane.secId,idx)),data:item}))
  );

  // Build ONE flat list covering every lane, INCLUDING a placeholder
  // entry for empty lanes. Without this, an empty lane has zero
  // entries in the flat view, so there is nothing to anchor it to —
  // which was the root cause of active groups "teleporting" past
  // every empty lane straight to the first/last lane that happened to
  // have real items. Each placeholder is tagged with its lane index
  // directly and is never active, never moves, never gets written
  // back as data — it only exists so every lane has a stable anchor
  // point in flat order.
  const flat=[];
  laneArr.forEach((arr,li)=>{
    if(arr.length===0){
      flat.push({li,placeholder:true});
    } else {
      arr.forEach(e=>flat.push({li,e}));
    }
  });

  const activeFlatIdxs=flat.map((f,fi)=>(f.e&&f.e.active)?fi:-1).filter(fi=>fi>=0);
  if(activeFlatIdxs.length===0)return;

  // Bounds: can the whole active group still move one more step?
  // (Placeholders don't count as "ends" to stop at — only real edges
  // of the entire flat sequence matter.)
  if(delta<0&&activeFlatIdxs[0]===0)return;
  if(delta>0&&activeFlatIdxs[activeFlatIdxs.length-1]===flat.length-1)return;

  beforeSave();

  // ── Move the entire active group by exactly one flat step ──
  // Pull every active entry out (preserving relative order), and
  // every OTHER entry (non-active items AND lane placeholders) stays
  // in its existing relative order untouched. Then re-insert the
  // active group shifted by one position among the "others" sequence.
  const activeRefs=activeFlatIdxs.map(fi=>flat[fi].e);
  const others=flat.filter(f=>!(f.e&&f.e.active)); // non-active items + all placeholders, in original order

  // How many "others" entries sit strictly before the active group
  // right now? That count, shifted by one in the travel direction,
  // tells us where to re-insert the group.
  const othersBeforeOld=flat.slice(0,activeFlatIdxs[0]).filter(f=>!(f.e&&f.e.active)).length;
  let othersBeforeNew = delta<0 ? Math.max(0,othersBeforeOld-1) : Math.min(others.length,othersBeforeOld+1);

  const newFlat=[
    ...others.slice(0,othersBeforeNew),
    ...activeRefs.map(e=>({e})), // wrap back into flat-entry shape (li unknown yet)
    ...others.slice(othersBeforeNew)
  ];

  // Now assign each entry in newFlat to a lane. Non-active items and
  // placeholders carry their ORIGINAL lane (li) — those never change.
  // For the active group: it just hopped over exactly one anchor in
  // the direction of travel, so it must take ON that anchor's lane —
  // not the lane of whatever anchor happens to precede it positionally
  // in newFlat (which, for upward moves, is actually the anchor it's
  // hopping AWAY from). Concretely:
  //   - moving up (delta<0): the group takes the lane of the anchor
  //     immediately AFTER it in newFlat (the one it just hopped over).
  //   - moving down (delta>0): the group takes the lane of the anchor
  //     immediately BEFORE it in newFlat.
  const newLaneArr=lanes.map(()=>[]);

  if(delta<0){
    // Walk backward so we always know the "next anchor's lane" already.
    let nextAnchorLane=null;
    for(let idx2=newFlat.length-1;idx2>=0;idx2--){
      const f=newFlat[idx2];
      if(f.placeholder){nextAnchorLane=f.li;continue;}
      if(f.li!==undefined){nextAnchorLane=f.li;newLaneArr[f.li].push(f.e);continue;}
      // active entry — use the next (upcoming, i.e. below it) anchor's lane
      if(nextAnchorLane===null)nextAnchorLane=0;
      newLaneArr[nextAnchorLane].push(f.e);
    }
    // reverse each lane back to correct order (we filled bottom-up)
    newLaneArr.forEach(arr=>arr.reverse());
  } else {
    let lastAnchorLane=0;
    newFlat.forEach(f=>{
      if(f.placeholder){lastAnchorLane=f.li;return;}
      if(f.li!==undefined){lastAnchorLane=f.li;newLaneArr[f.li].push(f.e);return;}
      newLaneArr[lastAnchorLane].push(f.e);
    });
  }

  // Write back.
  const touchedSecIds=new Set();
  lanes.forEach((lane,li)=>{
    const target=lane.type==='big'?getBigs(k,lane.secId):getSmalls(k,lane.secId);
    target.length=0;
    newLaneArr[li].forEach(e=>target.push(e.data));
    touchedSecIds.add(lane.secId);
  });

  save();
  touchedSecIds.forEach(sid=>renderSecBody(sid));
  updateTotal();

  const newActiveKeys=[];
  lanes.forEach((lane,li)=>{
    newLaneArr[li].forEach((e,idx)=>{
      if(e.active)newActiveKeys.push(itemKey(lane.type,lane.secId,idx));
    });
  });
  ACTIVE.clear();
  newActiveKeys.forEach(k2=>ACTIVE.add(k2));
  _anchorKey=newActiveKeys[0]||null;
  _focusFlatIdx=null;
  refreshActiveVisuals();
  scrollActiveIntoView();
}

function moveActiveItemsAcrossSection(delta){
  if(ACTIVE.size===0)return;
  const visibleSecs=SECS.filter(s=>ST.vis.includes(s.id)).map(s=>s.id);
  if(visibleSecs.length<2)return;
  const k=tKey();

  beforeSave();
  const positions=[...ACTIVE].map(parseItemKey);
  const touchedSecIds=new Set();
  const newActiveKeys=[];

  // Group by source section so each section's removals use correct,
  // still-valid indices (sorted descending to remove safely).
  const bySec={};
  positions.forEach(p=>{(bySec[p.secId]=bySec[p.secId]||[]).push(p);});

  Object.entries(bySec).forEach(([secId,items])=>{
    const curPos=visibleSecs.indexOf(secId);
    let destPos=curPos+delta;
    destPos=Math.max(0,Math.min(visibleSecs.length-1,destPos));
    const destSecId=visibleSecs[destPos];
    if(destSecId===secId){
      // already at the boundary — nothing to do for this group
      items.forEach(p=>newActiveKeys.push(itemKey(p.type,p.secId,p.idx)));
      touchedSecIds.add(secId);
      return;
    }
    // Remove from source (descending idx to stay valid), preserving
    // each item's original relative order for re-insertion.
    const sorted=[...items].sort((a,b)=>b.idx-a.idx);
    const extracted=sorted.map(p=>{
      const arr=p.type==='big'?getBigs(k,p.secId):getSmalls(k,p.secId);
      return{...p,data:arr.splice(p.idx,1)[0]};
    }).reverse(); // back to ascending original order

    extracted.forEach(p=>{
      const destArr=p.type==='big'?getBigs(k,destSecId):getSmalls(k,destSecId);
      const insertAt=destArr.length;
      destArr.push(p.data);
      newActiveKeys.push(itemKey(p.type,destSecId,insertAt));
    });
    touchedSecIds.add(secId);
    touchedSecIds.add(destSecId);
  });

  save();
  touchedSecIds.forEach(sid=>renderSecBody(sid));
  updateTotal();

  ACTIVE.clear();
  newActiveKeys.forEach(k2=>ACTIVE.add(k2));
  _anchorKey=newActiveKeys[0]||null;
  refreshActiveVisuals();
  scrollActiveIntoView();
}

// Master keydown handler — only meaningful on desktop, and behaves
// differently depending on whether a text input currently has focus.
document.addEventListener('keydown',e=>{
  if(IS_TOUCH)return;
  // Ignore when a menu/picker/AI drawer is open, to avoid double-handling.
  if(document.getElementById('taskMenu')?.style.display==='block')return;

  const editing=isAnyInputFocused();
  const inTaskInput=editing&&document.activeElement.closest('.big-item,.sm-item');

  // ── While editing a big/small task's text ──
  if(inTaskInput){
    const row=document.activeElement.closest('.big-item,.sm-item');
    const type=row.classList.contains('big-item')?'big':'small';
    const secId=row.dataset.id;
    const idx=parseInt(row.dataset.i);

    if((e.key==='ArrowUp'||e.key==='ArrowDown')&&!e.shiftKey&&!e.metaKey&&!e.altKey){
      e.preventDefault();
      const list=buildFlatList();
      const i=findFlatIndex(list,type,secId,idx);
      if(i<0)return;
      const ni=e.key==='ArrowUp'?i-1:i+1;
      if(ni<0||ni>=list.length)return;
      const it=list[ni];
      focusItemInput(it.type,it.secId,it.idx);
    }
    // Enter/Tab already handled by each input's own onkeydown (unchanged).
    return;
  }

  // ── Not editing text: arrow-key driven selection ──
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    const delta=e.key==='ArrowUp'?-1:1;

    if(e.shiftKey&&e.metaKey&&e.altKey){
      e.preventDefault();
      moveActiveItemsAcrossSection(delta);
      return;
    }
    if(e.shiftKey&&e.metaKey){
      e.preventDefault();
      moveActiveItems(delta);
      return;
    }
    if(e.shiftKey){
      e.preventDefault();
      moveActiveSelection(delta,true);
      return;
    }
    e.preventDefault();
    moveActiveSelection(delta,false);
    return;
  }

  if(e.key==='Enter'&&ACTIVE.size>0&&!e.shiftKey&&!e.metaKey&&!e.altKey){
    e.preventDefault();
    const k=_anchorKey||[...ACTIVE][0];
    const{type,secId,idx}=parseItemKey(k);
    focusItemInput(type,secId,idx);
  }
});

// Click the row-spacer (B-zone) to activate a row without entering
// text-edit mode. Wired up from attachDrag below via a tiny helper so
// it lives alongside the rest of the row's interaction setup.
function wireActivateClick(el,type,secId,idx){

function openTaskMenu(type, secId, idx, anchorEl, atPoint){
  _taskMenuCtx={type,secId,idx};
  const menu=document.getElementById('taskMenu');
  const overlay=document.getElementById('taskMenuOverlay');
  menu.style.display='block';
  overlay.style.display='block';
  menu.style.transform='';

  // On desktop, make the date input visible inline so the native
  // calendar-icon click target is real and reliably opens the picker.
  // On mobile, keep it as an invisible full-row overlay under the label
  // (iOS opens the picker from any tap on the associated label).
  //
  // The input is recreated from scratch every time the menu opens rather
  // than reusing the same node. iOS Safari was found to silently auto-
  // dismiss the native date picker on every *other* open of a reused
  // <input type="date"> (a reproducible odd/even pattern) — recreating
  // the element clears whatever internal picker state was causing it.
  const oldInp=document.getElementById('datePickerInput');
  const inp=document.createElement('input');
  inp.type='date';
  inp.id='datePickerInput';
  inp.setAttribute('onchange','moveTaskToPickedDate(this.value)');
  inp.onchange=function(){moveTaskToPickedDate(this.value);};
  inp.onfocus=()=>prepDatePicker();
  oldInp.replaceWith(inp);

  const labelRow=document.getElementById('dateLabelRow');
  if(!IS_TOUCH){
    inp.style.cssText='position:static;opacity:1;width:auto;height:auto;'+
      'margin-left:auto;background:var(--s2);color:var(--tx2);'+
      'border:1px solid var(--bd2);border-radius:6px;padding:3px 6px;'+
      'font-size:12px;-webkit-appearance:none;cursor:pointer;';
    labelRow.style.cursor='default';
  } else {
    inp.style.cssText='position:absolute;inset:0;width:100%;height:100%;'+
      'opacity:0;border:none;font-size:16px;-webkit-appearance:none;cursor:pointer;';
  }

  const mw=180,mh=170;
  let left,top;

  if(atPoint){
    left=atPoint.x;top=atPoint.y;
  } else if(anchorEl){
    const r=anchorEl.getBoundingClientRect();
    left=r.left;top=r.bottom+6;
  } else {
    left=window.innerWidth/2-mw/2;top=window.innerHeight/2-mh/2;
  }

  if(left+mw>window.innerWidth)left=window.innerWidth-mw-8;
  if(left<8)left=8;
  if(top+mh>window.innerHeight)top=(atPoint?atPoint.y:top)-mh-6;
  if(top<8)top=8;

  menu.style.left=left+'px';
  menu.style.top=top+'px';
}

function closeTaskMenu(){
  document.getElementById('taskMenu').style.display='none';

  document.getElementById('taskMenu').style.transform='';

  // there's no pending move to commit, so just clear the drag state.
  if(DR.active&&DR._frozen)cancelDragKeepingItem();
}

function moveTaskTo(days){
  if(!_taskMenuCtx)return;
  const {type,secId,idx}=_taskMenuCtx;
  const fromKey=tKey();
  const toDate=addDays(viewDate,days);
  const toKey=tKey(toDate);
  beforeSave();
  let item;
  if(type==='big'){
    item={...getBigs(fromKey,secId).splice(idx,1)[0]};
    getBigs(toKey,secId).push({text:item.text,done:false});
  } else {
    item={...getSmalls(fromKey,secId).splice(idx,1)[0]};
    getSmalls(toKey,secId).push({text:item.text,done:false});
  }
  save();
  renderSecBody(secId);
  updateTotal();
  closeTaskMenu();
  // brief flash to confirm
  const label=days===1?'내일로':'다음 주로';
  showToast(`${label} 이동했어요`);
}

function prepDatePicker(){
  const tomorrow=addDays(viewDate,1);

  inp.min=tKey(tomorrow);

}

function moveTaskToPickedDate(dateStr){
  if(!dateStr||!_taskMenuCtx)return;

// ─ Toast ─
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);'+
      'background:var(--s2);border:1px solid var(--bd2);color:var(--tx2);'+
      'font-size:12px;padding:8px 16px;border-radius:20px;z-index:300;'+
      'pointer-events:none;transition:opacity .3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',1800);
}

// ═══════ WEEKLY updated: click date → D view ═══════
function renderWeekly(){
  const el=document.getElementById('weeklyView');
  const today=new Date(),dow=today.getDay();
  const dates=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-dow+i);return d;});
  const vis=SECS.filter(s=>ST.vis.includes(s.id));
  let h=`<div class="view-ttl">이번 주</div><div class="wscr"><div class="wkg">
    <div class="wh"></div>
    ${dates.map((d,i)=>{
      const dk=`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
      return`<div class="wh${i===dow?' tc':''}" style="cursor:pointer" onclick="goToDate('${dk}')">${DOW[d.getDay()]} ${d.getDate()}</div>`;
    }).join('')}`;
  vis.forEach(sec=>{
    h+=`<div class="wlbl" style="color:${sec.color}">${sec.name}</div>`;
    dates.forEach((d,di)=>{
      const k=`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
      const bigs=ST.days[k]?.big?.[sec.id]||[];const sms=ST.days[k]?.small?.[sec.id]||[];
      h+=`<div class="wc${di===dow?' tc':''}" style="cursor:pointer" onclick="goToDate('${k}')">`;
      bigs.slice(0,2).forEach(b=>{if(b.text)h+=`<div class="wbig${b.done?' done':''}">${esc(b.text)}</div>`;});
      sms.slice(0,2).forEach(s=>h+=`<div class="wsm${s.done?' done':''}">${esc(s.text)}</div>`);
      const more=(bigs.length>2?bigs.length-2:0)+(sms.length>2?sms.length-2:0);
      if(more)h+=`<div class="wmore">+${more}</div>`;
      h+='</div>';
    });
  });
  h+='</div></div>';el.innerHTML=h;
}

// ═══════ MONTHLY updated: click day → D view ═══════
function renderMonthly(){
  const el=document.getElementById('monthlyView');const{y,m}=mCur;const today=new Date();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  let h=`<div class="mnav"><button class="mnb" onclick="chM(-1)">‹</button><div class="mttl">${y}년 ${MONS[m]}</div><button class="mnb" onclick="chM(1)">›</button></div>
  <div class="mcg">${DOW.map(d=>`<div class="mcdow">${d}</div>`).join('')}${Array(fd).fill('<div class="mcc empty"></div>').join('')}`;
  for(let d=1;d<=dim;d++){
    const k=`${y}-${z(m+1)}-${z(d)}`;const day=ST.days[k];
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const bigs=SECS.flatMap(s=>day?.big?.[s.id]||[]).filter(b=>b.text?.trim());
    const smt=SECS.reduce((a,s)=>a+(day?.small?.[s.id]?.length||0),0);
    h+=`<div class="mcc${isT?' mct':''}" style="cursor:pointer" onclick="goToDate('${k}')">
      <div class="mcd">${d}</div>
      <div class="mcdots">${bigs.map((b,i)=>`<div class="mcdot${i>=6?' ov':''}${b.done?' dn':''}"></div>`).join('')}</div>
      ${smt?`<div class="mcsc">${smt}</div>`:''}
    </div>`;
  }
  h+='</div>';el.innerHTML=h;
}
function chM(dir){mCur.m+=dir;if(mCur.m<0){mCur.m=11;mCur.y--;}if(mCur.m>11){mCur.m=0;mCur.y++;}renderMonthly();}

function goToDate(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  viewDate=new Date(y,m-1,d);
  sw('today',document.querySelector('.tab.on')||document.querySelector('.tab'));
}

function authErrorMessage(e){
  const code=e.code||'';
  if(code.includes('invalid-email'))return'이메일 형식이 올바르지 않아요.';
  if(code.includes('user-not-found')||code.includes('wrong-password')||code.includes('invalid-credential'))return'이메일 또는 비밀번호가 올바르지 않아요.';
  if(code.includes('email-already-in-use'))return'이미 가입된 이메일이에요. 로그인해주세요.';
  if(code.includes('weak-password'))return'비밀번호는 6자 이상이어야 해요.';
  if(code.includes('network'))return'네트워크 연결을 확인해주세요.';

// ── Firestore doc path: one document per user, holding their entire ST ──
function userDocRef(uid){
  return fbDB.collection('users').doc(uid).collection('data').doc('state');
}

// Push the current ST to Firestore. Called from rawSave() so every
// existing save-path in the app (big/small edits, drag reorders,
// trash, view-state changes, etc.) automatically syncs with zero
// changes needed anywhere else in the codebase.
let _fbWriteTimer=null;
function fbPushState(){
  if(!_fbUser||_fbApplyingRemote)return;
  // Debounce rapid-fire writes (e.g. fast typing) into one Firestore
  // write every 600ms instead of one per keystroke.
  clearTimeout(_fbWriteTimer);
  _fbWriteTimer=setTimeout(()=>{
    userDocRef(_fbUser.uid).set({
      json: JSON.stringify(ST),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(err=>console.warn('Firestore write failed (will retry via offline queue):',err));
  },600);
}

// Start listening for realtime changes to this user's data — so edits
// made on another device (iPad, Mac mini, etc.) appear here too.
function fbStartListening(uid){
  if(_fbUnsub)_fbUnsub();
  _fbUnsub=userDocRef(uid).onSnapshot(doc=>{
    if(!doc.exists)return; // first-ever login, nothing remote yet — local ST stands
    const data=doc.data();
    if(!data||!data.json)return;
    let remote;
    try{remote=JSON.parse(data.json);}catch(e){return;}

    // Apply the remote state without re-triggering a write (which would
    // otherwise create an infinite local-write -> remote-update -> local-write loop).
    _fbApplyingRemote=true;
    ST.vis=remote.vis||ST.vis;
    ST.prevVis=remote.prevVis??ST.prevVis;
    ST.preset=remote.preset??ST.preset;
    ST.collapsed=remote.collapsed||[];
    ST.days=remote.days||{};
    rawSave(); // keep localStorage mirror in sync as an offline cache
    _fbApplyingRemote=false;

    // Re-render whatever's currently on screen so the change shows up
    // immediately, without disrupting things like open menus/drags.
    if(!DR || !DR.active){
      const activeTab=document.querySelector('.tab.on')?.textContent;
      if(activeTab==='W')renderWeekly();
      else if(activeTab==='M')renderMonthly();
      else renderToday();
      updateTrashBadge?.();
    }
  },err=>console.warn('Firestore listener error:',err));
}

fbAuth.onAuthStateChanged(async user=>{
  if(user){
    _fbUser=user;
    document.getElementById('authScreen').classList.add('hidden');

    // On first login on THIS device, pull any existing remote data
    // before starting the UI — so we don't briefly show an empty/local
    // state and then have it jarringly replaced a moment later.
    try{
      const doc=await userDocRef(user.uid).get();
      if(doc.exists){
        const data=doc.data();
        if(data&&data.json){
          const remote=JSON.parse(data.json);
          _fbApplyingRemote=true;
          ST.vis=remote.vis||ST.vis;
          ST.prevVis=remote.prevVis??ST.prevVis;
          ST.preset=remote.preset??ST.preset;
          ST.collapsed=remote.collapsed||[];
          ST.days=remote.days||{};
          rawSave();
          _fbApplyingRemote=false;
        }
      } else {
        // No remote data yet for this account — push whatever's local
        // (e.g. data from before they logged in) so it isn't lost.
        fbPushState();
      }
    }catch(e){console.warn('Initial Firestore fetch failed, using local data:',e);}

    initAppUI();
    fbStartListening(user.uid);
  } else {
    _fbUser=null;
    if(_fbUnsub){_fbUnsub();_fbUnsub=null;}
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('authEmail').value='';
    document.getElementById('authPassword').value='';
  }
});
