<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BLOCK7</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:#0e0e12;display:flex;align-items:center;justify-content:center;font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
.wrap{text-align:center;padding:48px 28px;width:100%;max-width:360px;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:20px;letter-spacing:.18em;color:rgba(255,255,255,.4);margin-bottom:28px;}
.logo b{color:#5a70f8;font-weight:500;}
.msg{font-size:13px;font-weight:300;color:rgba(255,255,255,.28);letter-spacing:.03em;line-height:1.9;}
.dot{width:5px;height:5px;border-radius:50%;background:#5a70f8;margin:28px auto 0;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:.8;transform:scale(1.5);}}
.note-btn{display:inline-flex;align-items:center;justify-content:center;margin-top:36px;width:36px;height:36px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.22);transition:color .2s;-webkit-tap-highlight-color:transparent;}
.note-btn:hover{color:rgba(255,255,255,.5);}
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.25);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom,0);}
.modal-overlay.open{display:flex;}
.modal{background:#1a1a22;border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;}
.modal-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.04em;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:18px;line-height:1;-webkit-tap-highlight-color:transparent;}
.modal-close:hover{color:rgba(255,255,255,.6);}
textarea{width:100%;height:100px;resize:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:rgba(255,255,255,.8);font-family:'Pretendard',-apple-system,sans-serif;font-size:14px;font-weight:300;line-height:1.6;outline:none;transition:border-color .15s;}
textarea::placeholder{color:rgba(255,255,255,.2);}
textarea:focus{border-color:rgba(90,112,248,.5);}
.attach-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.attach-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 12px;color:rgba(255,255,255,.35);font-family:'Pretendard',sans-serif;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s,color .15s;}
.attach-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6);}
.attach-count{font-size:11px;color:rgba(255,255,255,.2);margin-left:2px;}
.img-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.img-preview img{width:56px;height:56px;object-fit:cover;border-radius:7px;border:1px solid rgba(255,255,255,.1);}
.file-list{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
.file-chip{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.05);border-radius:6px;padding:4px 8px;}
.send-btn{width:100%;margin-top:16px;background:#5a70f8;border:none;border-radius:10px;padding:12px;color:#fff;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.35;cursor:default;}
.status-msg{margin-top:10px;font-size:12px;color:rgba(255,255,255,.35);text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">BLOCK<b>7</b></div>
  <p class="msg">&ldquo;My Presence will go with you,<br>and I will give you rest.&rdquo;<br><br>곧 돌아올게요</p>
  <div class="dot"></div>
  <button class="note-btn" onclick="openModal()" title="개발자에게 쪽지 보내기">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>개발자에게 쪽지 보내기</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <textarea id="msgText" placeholder="남기고 싶은 말을 적어주세요"></textarea>

    <div class="attach-row">
      <!-- 이미지 첨부 -->
      <button class="attach-btn" onclick="document.getElementById('imgInput').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        이미지
        <span class="attach-count" id="imgCount"></span>
      </button>
      <!-- 파일 첨부 -->
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        파일
        <span class="attach-count" id="fileCount"></span>
      </button>
    </div>

    <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImages(this)">
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this)">

    <div class="img-preview" id="imgPreview"></div>
    <div class="file-list" id="fileList"></div>

    <button class="send-btn" id="sendBtn" onclick="sendNote()">보내기</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<script>
const EJ_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
const EJ_SERVICE_ID  = 'YOUR_SERVICE_ID';
const EJ_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';
emailjs.init({publicKey: EJ_PUBLIC_KEY});

let attachedImages=[], attachedFiles=[];

function openModal(){document.getElementById('modalOverlay').classList.add('open');setTimeout(()=>document.getElementById('msgText').focus(),100);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function handleImages(input){
  const files=[...input.files];if(!files.length)return;
  attachedImages=[];
  const preview=document.getElementById('imgPreview');preview.innerHTML='';
  document.getElementById('imgCount').textContent=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      attachedImages.push({name:file.name,base64:e.target.result});
      const img=document.createElement('img');img.src=e.target.result;preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function handleFiles(input){
  const files=[...input.files];if(!files.length)return;
  attachedFiles=[];
  const list=document.getElementById('fileList');list.innerHTML='';
  document.getElementById('fileCount').textContent=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      attachedFiles.push({name:file.name,base64:e.target.result,type:file.type});
    };
    reader.readAsDataURL(file);
    const chip=document.createElement('div');chip.className='file-chip';
    chip.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${file.name}`;
    list.appendChild(chip);
  });
}

async function sendNote(){
  const text=document.getElementById('msgText').value.trim();
  if(!text){document.getElementById('statusMsg').textContent='메시지를 입력해주세요';return;}
  const btn=document.getElementById('sendBtn');
  const status=document.getElementById('statusMsg');
  btn.disabled=true;status.textContent='전송 중…';

  const imgHtml=attachedImages.map(i=>`<br><img src="${i.base64}" style="max-width:480px;border-radius:8px;">`).join('');
  const fileHtml=attachedFiles.length
    ? '<br><b>첨부 파일:</b><br>'+attachedFiles.map(f=>`${f.name}`).join('<br>')
    : '';

  try{
    await emailjs.send(EJ_SERVICE_ID, EJ_TEMPLATE_ID,{
      message: text,
      images_html: imgHtml,
      files_html: fileHtml,
      from_page: 'BLOCK7 점검 페이지',
      sent_at: new Date().toLocaleString('ko-KR'),
    });
    status.textContent='전송됐어요 ✓';
    document.getElementById('msgText').value='';
    document.getElementById('imgPreview').innerHTML='';
    document.getElementById('fileList').innerHTML='';
    document.getElementById('imgCount').textContent='';
    document.getElementById('fileCount').textContent='';
    attachedImages=[];attachedFiles=[];
    setTimeout(closeModal,1200);
  }catch(err){
    status.textContent='전송 실패. 다시 시도해주세요';
    console.error(err);
  }finally{btn.disabled=false;}
}
</script>
</body>
</html>
